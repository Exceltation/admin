<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exceltation | Admin Control Panel</title>
    <link rel="icon" type="image/png" href="https://exceltation.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f5; color: #333; min-height: 100vh; }
        
        /* Secure Login Gateway Card Layout */
        .gateway-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        .gateway-card { background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .gateway-card h2 { color: #169A3A; margin-bottom: 1.5rem; font-weight: 700; }
        .input-group { margin-bottom: 1.25rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: #169A3A; }
        .gate-btn { width: 100%; background-color: #169A3A; color: white; border: none; padding: 1rem; font-size: 1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; margin-top: 1rem; }
        .gate-btn:hover { background-color: #11742B; }
        .err-banner { color: #d9534f; font-size: 0.9rem; margin-top: 1rem; display: none; font-weight: 500; }

        /* Administrative Core Workspace Platform Styles */
        .workspace-platform { display: none; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .navbar .logo { font-size: 1.4rem; font-weight: bold; color: #169A3A; text-decoration: none; }
        .logout-btn { background: none; border: 1px solid #d9534f; color: #d9534f; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { background: #d9534f; color: white; }

        /* Dynamic Operations Console Grid System */
        .manager-grid { max-width: 1300px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 380px 1fr; gap: 2rem; }
        .panel-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); height: fit-content; }
        .panel-box h3 { margin-bottom: 1.5rem; color: #111; border-bottom: 2px solid #f4f7f5; padding-bottom: 0.5rem; }
        
        /* Inventory Input Forms */
        .form-row { margin-bottom: 1.25rem; }
        .form-row label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.85rem; color: #555; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 0.7rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        .form-row textarea { height: 80px; resize: vertical; }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #169A3A; }
        
        .action-submit-btn { width: 100%; background-color: #169A3A; color: white; border: none; padding: 0.85rem; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .action-submit-btn:hover { background-color: #11742B; }

        /* Console Operations Monitoring Board Table */
        .table-wrapper { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); overflow-x: auto; }
        .table-wrapper h3 { margin-bottom: 1.5rem; color: #111; }
        .crud-table { width: 100%; border-collapse: collapse; text-align: left; }
        .crud-table th { background-color: #f8faf9; padding: 1rem; font-weight: 600; color: #444; border-bottom: 2px solid #eaeaea; }
        .crud-table td { padding: 1rem; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; vertical-align: top; }
        
        /* Control Action Buttons */
        .ctrl-btn { border: none; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.8rem; margin-right: 0.5rem; transition: background 0.2s; }
        .edit-btn { background-color: #eaf4fe; color: #0066cc; }
        .edit-btn:hover { background-color: #0066cc; color: white; }
        .remove-btn { background-color: #fdeded; color: #d9534f; }
        .remove-btn:hover { background-color: #d9534f; color: white; }
        
        .badge { display: inline-block; padding: 0.15rem 0.5rem; font-size: 0.75rem; font-weight: bold; border-radius: 3px; background: #e8f5ec; color: #169A3A; }
        .plat-badge { background: #e0f0ff; color: #0066cc; margin-left: 0.25rem; }
    </style>
</head>
<body>

    <!-- SECURE INTERCEPT ENTRY HUB LAYER -->
    <div id="loginGateway" class="gateway-container">
        <div class="gateway-card">
            <h2>Exceltation Secure Access</h2>
            <div class="input-group">
                <label for="adminUser">Admin Identity</label>
                <input type="text" id="adminUser" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="adminPass">Security Phrase</label>
                <input type="password" id="adminPass" placeholder="Password">
            </div>
            <button class="gate-btn" onclick="executeSecureAuthentication()">Verify Credentials</button>
            <div id="authFailureMessage" class="err-banner">Access Denied. Verification failed.</div>
        </div>
    </div>

    <!-- ADMINISTRATIVE PRODUCT MANAGER WORKING PLATFORM -->
    <div id="workspacePlatform" class="workspace-platform">
        <nav class="navbar">
            <span class="logo">Exceltation™ Control Console</span>
            <button class="logout-btn" onclick="terminateSession()">Terminate Session</button>
        </nav>

        <div class="manager-grid">
            <!-- CONTROL INTERFACE PANEL: WRITE OPERATIONS -->
            <aside class="panel-box">
                <h3 id="formTitle">Add Live Product</h3>
                <form id="productForm" onsubmit="handleProductSubmission(event)">
                    <input type="hidden" id="productId">
                    <div class="form-row">
                        <label for="pName">Product Name</label>
                        <input type="text" id="pName" required placeholder="e.g. Asset Analyzer Pro">
                    </div>
                    <div class="form-row">
                        <label for="pCategory">System Category</label>
                        <select id="pCategory">
                            <option value="Finance">Finance</option>
                            <option value="DoD">DoD</option>
                            <option value="Gaming">Gaming</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="pPlatform">Operational Platform</label>
                        <select id="pPlatform">
                            <option value="Excel">Excel</option>
                            <option value="Apps">Apps</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="pPrice">Pricing Allocation String</label>
                        <input type="text" id="pPrice" required placeholder="e.g. $250">
                    </div>
                    <div class="form-row">
                        <label for="pDesc">Functional Capabilities Brief</label>
                        <textarea id="pDesc" required placeholder="Describe specifications and features..."></textarea>
                    </div>
                    <button type="submit" id="formSubmitBtn" class="action-submit-btn">Publish Product</button>
                    <button type="button" id="cancelEditBtn" class="ctrl-btn remove-btn" style="width:100%; margin-top:0.5rem; padding:0.75rem; display:none;" onclick="revertFormState()">Cancel Modifications</button>
                </form>
            </aside>

            <!-- MONITORING PLATFORM: DATA READ BOARD -->
            <main class="table-wrapper">
                <h3>Live Active Catalog Items</h3>
                <table class="crud-table">
                    <thead>
                        <tr>
                            <th>Classification</th>
                            <th>Item Specs</th>
                            <th>Price</th>
                            <th>Console Controls</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- Dynamic operational elements render natively here -->
                    </tbody>
                </table>
            </main>
        </div>
    </div>
    <script>
        // Local state mockup infrastructure
        let activeInventory = [
            { id: 1, name: "Capital Modeler Pro", category: "Finance", platform: "Excel", price: "$299", desc: "Automated cashflow projection matrices with visual analytics." },
            { id: 2, name: "Defense Logistics Framework", category: "DoD", platform: "Other", price: "$1,450", desc: "High-security strategic tactical tracking system." },
            { id: 3, name: "GuildMaster Ledger", category: "Gaming", platform: "Apps", price: "$19", desc: "Mobile companion application tracking virtual market variables." }
        ];

        // Crypto helper engine converting strings into SHA-256 signatures asynchronously
        async function computeSHA256(inputString) {
            const dataBuffer = new TextEncoder().encode(inputString);
            const hashedBuffer = await crypto.subtle.digest('SHA-256', dataBuffer);
            return Array.from(new Uint8Array(hashedBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Network Fetch routing checking hashes against data layers
        async function executeSecureAuthentication() {
            const userInput = document.getElementById('adminUser').value.trim();
            const passwordInput = document.getElementById('adminPass').value.trim();
            const failureAlert = document.getElementById('authFailureMessage');

            try {
                // Read from your hidden auth file asynchronously via AJAX network link
                const networkResponse = await fetch('auth.json');
                const authorizationKeys = await networkResponse.json();
                
                // Scramble the typed input password into a matching hash pattern
                const calculatedHash = await computeSHA256(passwordInput);

                if (userInput === authorizationKeys.username && calculatedHash === authorizationKeys.passHash) {
                    document.getElementById('loginGateway').style.display = "none";
                    document.getElementById('workspacePlatform').style.display = "block";
                    refreshInventoryDisplay();
                } else {
                    failureAlert.style.display = "block";
                }
            } catch (error) {
                console.error("Authentication file transmission interrupted:", error);
                failureAlert.innerText = "Security check system mapping error.";
                failureAlert.style.display = "block";
            }
        }

        function refreshInventoryDisplay() {
            const rowOutputContainer = document.getElementById('inventoryTableBody');
            rowOutputContainer.innerHTML = "";

            activeInventory.forEach(item => {
                rowOutputContainer.innerHTML += `
                    <tr id="row-${item.id}">
                        <td>
                            <span class="badge">${item.category}</span><br>
                            <span class="badge plat-badge">${item.platform}</span>
                        </td>
                        <td>
                            <strong>${item.name}</strong>
                            <p style="color:#666; font-size:0.85rem; margin-top:0.25rem;">${item.desc}</p>
                        </td>
                        <td class="price">${item.price}</td>
                        <td>
                            <button class="ctrl-btn edit-btn" onclick="stageProductModification(${item.id})">Edit</button>
                            <button class="ctrl-btn remove-btn" onclick="executeProductDeletion(${item.id})">Remove</button>
                        </td>
                    </tr>`;
            });
        }

        function handleProductSubmission(event) {
            event.preventDefault();
            const idValue = document.getElementById('productId').value;
            const name = document.getElementById('pName').value.trim();
            const category = document.getElementById('pCategory').value;
            const platform = document.getElementById('pPlatform').value;
            const price = document.getElementById('pPrice').value.trim();
            const desc = document.getElementById('pDesc').value.trim();

            if (idValue) {
                // Execute Update operation on existing asset record match
                const itemIndex = activeInventory.findIndex(p => p.id == idValue);
                activeInventory[itemIndex] = { id: parseInt(idValue), name, category, platform, price, desc };
            } else {
                // Execute Create operation appending new inventory allocation entries
                const generatedId = activeInventory.length > 0 ? Math.max(...activeInventory.map(p => p.id)) + 1 : 1;
                activeInventory.push({ id: generatedId, name, category, platform, price, desc });
            }

            revertFormState();
            refreshInventoryDisplay();
        }

        function stageProductModification(id) {
            const targetItem = activeInventory.find(p => p.id === id);
            if (!targetItem) return;

            document.getElementById('productId').value = targetItem.id;
            document.getElementById('pName').value = targetItem.name;
            document.getElementById('pCategory').value = targetItem.category;
            document.getElementById('pPlatform').value = targetItem.platform;
            document.getElementById('pPrice').value = targetItem.price;
            document.getElementById('pDesc').value = targetItem.desc;

            document.getElementById('formTitle').innerText = "Modify Catalog Product";
            document.getElementById('formSubmitBtn').innerText = "Apply Updates";
            document.getElementById('cancelEditBtn').style.display = "block";
        }

        function executeProductDeletion(id) {
            if (confirm("Are you sure you want to remove this item from the active database tracking matrix?")) {
                activeInventory = activeInventory.filter(p => p.id !== id);
                refreshInventoryDisplay();
                revertFormState();
            }
        }

        function revertFormState() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = "";
            document.getElementById('formTitle').innerText = "Add Live Product";
            document.getElementById('formSubmitBtn').innerText = "Publish Product";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        function terminateSession() {
            document.getElementById('adminUser').value = "";
            document.getElementById('adminPass').value = "";
            document.getElementById('workspacePlatform').style.display = "none";
            document.getElementById('loginGateway').style.display = "flex";
        }
    </script>
</body>
</html>
